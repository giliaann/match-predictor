{% extends 'base.html' %}

{% block content %}
<style>
    .logout-wrapper {
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: calc(100vh - 80px);
        padding: 2rem;
        box-sizing: border-box;
    }

    .logout-container {
        width: 100%;
        max-width: 400px;
        background-color: #1e293b;
        border: 1px solid #334155;
        border-radius: 0.75rem;
        padding: 2.5rem;
        box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3);
        text-align: center;
    }

    .logout-container h1 {
        font-size: 1.75rem;
        font-weight: 800;
        color: #f8fafc;
        margin: 0 0 1rem 0;
        letter-spacing: -0.5px;
    }

    .logout-container p {
        color: #cbd5e1;
        font-size: 1rem;
        margin: 0 0 2rem 0;
        line-height: 1.5;
    }

    .btn-login-again {
        display: block;
        width: 100%;
        box-sizing: border-box;
        padding: 0.75rem;
        background-color: #2563eb;
        color: #ffffff;
        font-weight: 600;
        font-size: 1rem;
        text-decoration: none;
        border-radius: 0.375rem;
        transition: background-color 0.2s ease;
    }

    .btn-login-again:hover {
        background-color: #1d4ed8;
    }

    .back-link {
        display: inline-block;
        margin-top: 1.5rem;
        font-size: 0.875rem;
        color: #94a3b8;
        text-decoration: none;
        font-weight: 500;
        transition: color 0.2s ease;
    }

    .back-link:hover {
        color: #cbd5e1;
    }
</style>

<div class="logout-wrapper">
    <div class="logout-container">
        <h1>Logged Out Successfully</h1>
        <p>Thank you for visiting. You have been securely logged out of your account.</p>
        
        <a href="{% url 'login' %}" class="btn-login-again">Log In Again</a>
        
        <a href="{% url 'competition_list' %}" class="back-link">&larr; Back to competition list</a>
    </div>
</div>
{% endblock content %}
