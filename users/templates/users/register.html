{% extends 'base.html' %}

{% block content %}
<style>
    .register-wrapper {
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: calc(100vh - 80px);
        padding: 2rem;
        box-sizing: border-box;
    }

    .register-container {
        width: 100%;
        max-width: 450px;
        background-color: #1e293b;
        border: 1px solid #334155;
        border-radius: 0.75rem;
        padding: 2.5rem;
        box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3);
        text-align: center;
    }

    .register-container h1 {
        font-size: 1.75rem;
        font-weight: 800;
        color: #f8fafc;
        margin: 0 0 1.5rem 0;
        letter-spacing: -0.5px;
    }

    .register-form {
        text-align: left;
    }

    .register-form p {
        margin: 0 0 1.25rem 0;
    }

    .register-form label {
        display: block;
        font-size: 0.875rem;
        font-weight: 600;
        color: #cbd5e1;
        margin-bottom: 0.5rem;
    }

    .register-form input[type="text"],
    .register-form input[type="password"],
    .register-form input[type="email"] {
        width: 100%;
        box-sizing: border-box;
        padding: 0.625rem;
        background-color: #0f172a;
        border: 1px solid #475569;
        border-radius: 0.375rem;
        color: #f8fafc;
        font-size: 1rem;
        transition: border-color 0.2s ease, box-shadow 0.2s ease;
    }

    .register-form input:focus {
        outline: none;
        border-color: #60a5fa;
        box-shadow: 0 0 0 1px #60a5fa;
    }

    .register-form ul.errorlist {
        list-style: none;
        padding: 0;
        margin: 0.5rem 0 0 0;
        color: #f87171;
        font-size: 0.85rem;
    }

    .register-form .helptext {
        display: block;
        font-size: 0.75rem;
        color: #94a3b8;
        margin-top: 0.35rem;
        line-height: 1.4;
    }

    .btn-register {
        width: 100%;
        padding: 0.75rem;
        background-color: #2563eb;
        color: #ffffff;
        font-weight: 600;
        font-size: 1rem;
        border: none;
        border-radius: 0.375rem;
        cursor: pointer;
        transition: background-color 0.2s ease;
        margin-top: 1rem;
    }

    .btn-register:hover {
        background-color: #1d4ed8;
    }

    .login-link {
        margin-top: 1.5rem;
        font-size: 0.875rem;
        color: #94a3b8;
    }

    .login-link a {
        color: #60a5fa;
        text-decoration: none;
        font-weight: 600;
        transition: color 0.2s ease;
    }

    .login-link a:hover {
        color: #93c5fd;
    }
</style>

<div class="register-wrapper">
    <div class="register-container">
        <h1>Create an Account</h1>
        
        <form method="POST" action="{% url 'register' %}" class="register-form">
            {% csrf_token %}
            
            {{ form.as_p }}
            
            <button type="submit" class="btn-register">Sign Up</button>
        </form>
        
        <div class="login-link">
            Already have an account? <a href="{% url 'login' %}">Log In here</a>
        </div>
    </div>
</div>
{% endblock content %}
