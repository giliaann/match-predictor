{% extends 'base.html' %}

{% block content %}
    <div class="register-container">
        <h1>Create an Account</h1>
        
        <form method="POST" action="{% url 'register' %}">
            {% csrf_token %}
            
            {{ form.as_p }}
            
            <button type="submit">Sign Up</button>
        </form>
        
        <p>Already have an account? <a href="{% url 'login' %}">Log In here</a></p>
    </div>
{% endblock content %}
